<!DOCTYPE html>
<html lang="en" data-theme="{{ settings.theme_default }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotifyBridge</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">NotifyBridge</p>
          <h1>Local notification intake, replay, and triage.</h1>
        </div>
        <div class="hero-actions">
          <button id="random-button" class="button ghost">Random Demo</button>
          <button id="clear-all-button" class="button ghost">Clear All</button>
          <button id="theme-toggle" class="button ghost">Toggle theme</button>
        </div>
      </header>
      <section class="grid">
        <section class="panel">
          <h2>API Keys</h2>
          <form id="key-form">
            <button class="button" type="submit">Generate key</button>
          </form>
          <div id="keys"></div>
        </section>
        <section class="panel">
          <div class="panel-heading">
            <h2>Notifications</h2>
            <button id="clear-filter-button" class="button ghost">Filter: All</button>
          </div>
          <div id="notifications"></div>
        </section>
        <section class="panel collapsed" id="audit-panel" data-collapsed="true">
          <div class="panel-heading">
            <h2>Audit Log</h2>
            <button id="audit-toggle-button" class="button ghost">Expand Audit Log</button>
          </div>
          <div id="audit"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
